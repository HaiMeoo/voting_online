<!DOCTYPE html>
<html>
<head>
    <title>Vote</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">
    <div class="card">
        <h2>🗳️ Cast Your Vote</h2>

        <!-- KHÔNG dùng form nữa -->
        {% for c in candidates %}
            <button onclick="vote('{{ c.Name }}')">
                {{ c.Name }}
            </button>
        {% endfor %}

        <br><br>

        <form action="/result" method="get">
            <button type="submit">📊 Xem kết quả vote</button>
        </form>

    </div>
</div>

<!-- ethers -->
<script src="https://cdn.jsdelivr.net/npm/ethers@6.6.2/dist/ethers.umd.min.js"></script>

<script>
if (window.ethereum) {
    window.ethereum.on('accountsChanged', function (accounts) {
        if (accounts.length > 0) {
            alert('Bạn đã đổi tài khoản MetaMask. Trang sẽ tải lại để đồng bộ.');
            window.location.reload();
        }
    });
}

async function vote(candidate) {
    if (!window.ethereum) {
        alert("Chưa cài MetaMask!");
        return;
    }

    try {
        const provider = new ethers.BrowserProvider(window.ethereum);
        const signer = await provider.getSigner();
        const address = await signer.getAddress();

        console.log("Đang dùng account:", address);
        if (!address) {
            throw new Error('Không lấy được địa chỉ MetaMask. Vui lòng đăng nhập lại rồi thử lại.');
        }

        // Lưu ý: Đảm bảo địa chỉ Contract này đã được deploy trên Cronos Testnet
        const contractAddress = "0xd3D80b6De58Bfb705804cF67F00a94e2F13167fB";

        const abi = [
            {
                "inputs": [
                    {
                        "internalType": "string",
                        "name": "name",
                        "type": "string"
                    }
                ],
                "name": "vote",
                "outputs": [],
                "stateMutability": "nonpayable",
                "type": "function"
            }
        ];

        const contract = new ethers.Contract(contractAddress, abi, signer);

        // --- ĐOẠN THAY ĐỔI CHÍNH ---
        console.log("Đang gửi lệnh vote cho:", candidate);
        
        // Thêm gasLimit để tránh lỗi "Out of gas" trên Testnet
        const tx = await contract.vote(candidate, {
            gasLimit: 300000 
        });

        alert("Giao dịch đã gửi! Đang chờ xác nhận trên Blockchain...");

        const receipt = await tx.wait();
        
        if (receipt.status === 1) {
            alert("✅ Vote thành công cho " + candidate + "!");

            const response = await fetch('/vote', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ candidate, address })
            });

            const result = await response.json();
            if (!response.ok || !result.success) {
                throw new Error(result.error || 'Không thể lưu vote vào server.');
            }

            window.location.href = '/result';
        } else {
            alert("❌ Giao dịch bị đảo ngược (Reverted) bởi Smart Contract!");
        }

    } catch (err) {
        console.error("Lỗi chi tiết:", err);

        // Trích xuất thông báo lỗi thật từ Smart Contract hoặc MetaMask
        let errorMessage = "Vote thất bại!";
        
        if (err.reason) {
            errorMessage = err.reason; // Ví dụ: "Already voted"
        } else if (err.data && err.data.message) {
            errorMessage = err.data.message;
        } else if (err.message) {
            if (err.message.includes("user rejected")) {
                errorMessage = "Bạn đã từ chối giao dịch trên MetaMask.";
            } else {
                errorMessage = err.message;
            }
        }

        alert("❌ " + errorMessage);
    }
}
</script>

</body>
</html>
